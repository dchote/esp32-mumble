[tool.ruff]
line-length = 120
target-version = "py312"
src = ["components", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = [
  "E501",  # line length handled by formatter where practical
]

[tool.ruff.lint.per-file-ignores]
"scripts/patch_mbedtls_requires.py" = ["E402", "F821"]  # PlatformIO Import("env") before imports
