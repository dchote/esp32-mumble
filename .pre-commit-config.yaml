repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(components/mumble/.*\.py|scripts/.*\.py)$
      - id: ruff-format
        files: ^(components/mumble/.*\.py|scripts/.*\.py)$

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: ^components/mumble/.*\.(h|hpp|c|cc|cpp)$
