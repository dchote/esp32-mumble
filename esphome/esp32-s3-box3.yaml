---
# ESP32-S3 Box 3 board config for Mumble client
# Uses I2S pins from docs/technical-overview.md Box 3 profile
# Configure server, port, username, password, channel, and mode in Home Assistant UI (values persist in NVS)

substitutions:
  name: esp32-mumble-box3

esphome:
  name: ${name}
  name_add_mac_suffix: true
  min_version: "2024.1.0"

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: arduino

# PSRAM required for audio
psram:
  mode: octal
  speed: 80MHz

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password

logger:
  hardware_uart: USB_SERIAL_JTAG

api:

ota:
  - platform: esphome

# Mumble connection and mode settings (Configuration section; persisted to NVS)
# Entity names use numeric prefixes for display order: server, port, username, password, channel, mode
# Port is text (not number) so it displays as integer in HA, per home-assistant-voice-pe pattern
text:
  - platform: template
    id: mumble_server_host
    name: "1. Server"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "192.168.1.100"
    max_length: 253
  - platform: template
    id: mumble_server_port
    name: "2. Port"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "64738"
    max_length: 5
  - platform: template
    id: mumble_username
    name: "3. Username"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "box3-intercom"
    max_length: 128
  - platform: template
    id: mumble_password
    name: "4. Password"
    entity_category: config
    mode: password
    optimistic: true
    restore_value: true
    initial_value: ""
    max_length: 128
  - platform: template
    id: mumble_default_channel
    name: "5. Channel"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""
    max_length: 128
select:
  - platform: template
    id: mumble_mode
    name: "6. Mode"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "always_on"
    options:
      - "always_on"
      - "push_to_talk"

# Diagnostics section (HA device page)
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    entity_category: diagnostic
    update_interval: 60s
  - platform: template
    name: "Mumble Ping"
    id: mumble_ping_sensor
    entity_category: diagnostic
    unit_of_measurement: "ms"
    device_class: duration
    accuracy_decimals: 0
    lambda: |-
      return id(mumble_client).get_ping_ms();
    update_interval: 5s
binary_sensor:
  - platform: template
    name: "Mumble Connected"
    id: mumble_connected_sensor
    entity_category: diagnostic
    device_class: connectivity
    lambda: |-
      return id(mumble_client).is_connected();

# Microphone enabled/disabled (Controls section) - explicit on/off
switch:
  - platform: template
    name: "Microphone Enabled"
    id: mumble_microphone_enabled
    icon: "mdi:microphone"
    lambda: |-
      return id(mumble_client).get_microphone_enabled();
    turn_on_action:
      - mumble.microphone_enable: mumble_client
    turn_off_action:
      - mumble.microphone_disable: mumble_client

external_components:
  - source:
      type: local
      path: ../components

mumble:
  id: mumble_client
  server: ""
  port: 64738
  username: ""
  password: ""
  channel: ""
  server_text_id: mumble_server_host
  port_text_id: mumble_server_port
  username_text_id: mumble_username
  password_text_id: mumble_password
  channel_text_id: mumble_default_channel
  mode_select_id: mumble_mode
  microphone_switch_id: mumble_microphone_enabled
  mode: always_on
  crypto: lite
  # mute_pin: GPIO38  # Hardware mute switch if available
