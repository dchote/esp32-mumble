---
# ESP32-S3-BOX-3 board config for Mumble client
# Uses ESP-IDF framework with lwIP netconn for UDP.
# Keep functionally in sync with esp32-s3-box.yaml (same entities/features; only pins differ).
# Pinout: backlight GPIO47, I2S LRCLK GPIO45 (original Box uses backlight 45, LRCLK 47).
# Configure server, port, username, password, channel, and mode in Home Assistant UI (values persist in NVS)
# First flash after switching framework must be via USB, not OTA.

substitutions:
  name: esp32-mumble-box3

esphome:
  name: ${name}
  name_add_mac_suffix: true
  min_version: "2025.5.0"
  on_boot:
    - priority: 600
      then:
        - light.turn_off: screen_backlight
    - priority: -100
      then:
        - speaker.volume_set:
            id: box_speaker
            volume: !lambda |-
              float vol = id(mumble_speaker_volume).state;
              if (isnan(vol)) vol = 80;
              return vol / 100.0f;
  platformio_options:
    extra_scripts:
      - pre:../../../../scripts/patch_mbedtls_requires.py
    build_flags:
      - -Wno-cpp
      - -Wno-stringop-overread

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_MBEDTLS_AES_C: "y"
      CONFIG_MBEDTLS_GCM_C: "y"
      CONFIG_ESP_TLS_INSECURE: "y"
      CONFIG_ESP_TLS_SKIP_SERVER_CERT_VERIFY: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password

logger:
  hardware_uart: USB_SERIAL_JTAG

# Screen backlight: keep off by default (wake-word-voice-assistants uses GPIO47 for Box 3)
output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: screen_backlight
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_OFF

# GPIO1 = hardware mic mute button (latching toggle). LED off = unmuted, LED on = muted.
# On unmute, re-init ES7210 via I2C to restore ADC registers after hardware mute.
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    name: "Microphone Muted"
    id: button_microphone
    on_state:
      - if:
          condition:
            binary_sensor.is_on: button_microphone
          then:
            - microphone.mute:
            - mumble.microphone_disable: mumble_client
          else:
            - lambda: id(es7210_adc).setup();
            - delay: 50ms
            - microphone.unmute:
            - mumble.microphone_enable: mumble_client
  - platform: template
    name: "Voice Received"
    id: mumble_voice_active
    icon: "mdi:microphone-message"
    device_class: running
    lambda: |-
      return id(mumble_client).get_voice_active();
  - platform: template
    name: "Voice Sending"
    id: mumble_voice_sending
    icon: "mdi:microphone"
    device_class: running
    lambda: |-
      return id(mumble_client).get_voice_sending();

# Diagnostics
  - platform: template
    name: "Mumble Connected"
    id: mumble_connected_sensor
    icon: "mdi:connection"
    entity_category: diagnostic
    device_class: connectivity
    lambda: |-
      return id(mumble_client).is_connected();
i2c:
  scl: GPIO18
  sda: GPIO8

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 30dB

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    i2s_audio_id: i2s_audio_bus
    bits_per_sample: 16bit
    bits_per_channel: 16bit
    channel: left
    adc_type: external
    correct_dc_offset: true

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    buffer_duration: 500ms

api:

ota:
  - platform: esphome

# Mumble connection and mode settings (Configuration section; persisted to NVS)
# Entity names use numeric prefixes for display order: server, port, username, password, channel, mode
# Port is text (not number) so it displays as integer in HA, per home-assistant-voice-pe pattern
text:
  - platform: template
    id: mumble_server_host
    name: "1. Server"
    icon: "mdi:server-network"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "192.168.1.100"
    max_length: 253
  - platform: template
    id: mumble_server_port
    name: "2. Port"
    icon: "mdi:ethernet"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "64738"
    max_length: 5
  - platform: template
    id: mumble_username
    name: "3. Username"
    icon: "mdi:account"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""  # Seeded with esp32-<MAC> at setup; user can overwrite
    max_length: 128
  - platform: template
    id: mumble_password
    name: "4. Password"
    icon: "mdi:key"
    entity_category: config
    mode: password
    optimistic: true
    restore_value: true
    initial_value: ""  # Component publishes empty default at setup (avoids HA "unknown")
    max_length: 128
  - platform: template
    id: mumble_channel
    name: "5. Channel"
    icon: "mdi:forum"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""  # Component publishes empty default at setup (avoids HA "unknown")
    max_length: 128
select:
  - platform: template
    id: mumble_mode
    name: "6. Mode"
    icon: "mdi:microphone-settings"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "always_on"
    options:
      - "always_on"
      - "push_to_talk"
  - platform: template
    id: mumble_crypto
    name: "7. Crypto"
    icon: "mdi:lock"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "legacy"
    options:
      - "legacy"
      - "lite"

# Diagnostics section (HA device page)
button:
  - platform: template
    name: "Reset Config"
    id: mumble_reset_config
    icon: "mdi:restore"
    entity_category: diagnostic
    on_press:
      - mumble.reset_config: mumble_client
text_sensor:
  - platform: template
    name: "Transport"
    id: mumble_transport
    icon: "mdi:protocol"
    entity_category: diagnostic
    lambda: |-
      if (id(mumble_client).get_voice_transport_udp()) {
        return {"UDP"};
      } else {
        return {"TCP"};
      }
    update_interval: 5s
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    icon: "mdi:wifi"
    entity_category: diagnostic
    update_interval: 60s
  - platform: template
    name: "Mumble Ping"
    id: mumble_ping_sensor
    icon: "mdi:lan"
    entity_category: diagnostic
    unit_of_measurement: "ms"
    device_class: duration
    accuracy_decimals: 0
    lambda: |-
      return id(mumble_client).get_ping_ms();
    update_interval: 5s

# Controls: speaker volume and microphone
number:
  - platform: template
    name: "Speaker Volume"
    id: mumble_speaker_volume
    icon: "mdi:volume-high"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 80
    set_action:
      - speaker.volume_set:
          id: box_speaker
          volume: !lambda 'return x / 100.0;'

# Speaker Enable: Box-3 PA enable on GPIO46 (original Box may use same)
switch:
  - platform: gpio
    name: "Speaker Power"
    icon: "mdi:speaker"
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
  - platform: template
    name: "Mute"
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      - microphone.mute:
      - mumble.microphone_disable: mumble_client
    on_turn_off:
      - microphone.unmute:
      - mumble.microphone_enable: mumble_client

external_components:
  - source:
      type: local
      path: ../components

mumble:
  id: mumble_client
  server: "192.168.1.100"  # Fallback when text entity not yet synced
  port: 64738
  username: ""
  password: ""
  channel: ""
  server_text_id: mumble_server_host
  port_text_id: mumble_server_port
  username_text_id: mumble_username
  password_text_id: mumble_password
  channel_text_id: mumble_channel
  mode_select_id: mumble_mode
  crypto_select_id: mumble_crypto
  microphone_id: box_mic
  speaker_id: box_speaker
  mode: always_on
  crypto: legacy
  # mute_pin: GPIO38  # Hardware mute switch if available
