---
# ESP32-S3-BOX-3 board config for Mumble client
# Uses ESP-IDF framework with lwIP netconn for UDP.
# Keep functionally in sync with esp32-s3-box.yaml (same entities/features; only pins differ).
# Pinout: backlight GPIO47, I2S LRCLK GPIO45 (original Box uses backlight 45, LRCLK 47).
# Configure server, port, username, password, channel, and mode in Home Assistant UI (values persist in NVS)
# First flash after switching framework must be via USB, not OTA.

substitutions:
  name: esp32-mumble-box3

esphome:
  name: ${name}
  name_add_mac_suffix: true
  min_version: "2025.5.0"
  on_boot:
    - priority: 600
      then:
        - light.turn_on: screen_backlight
    - priority: -100
      then:
        - speaker.volume_set:
            id: box_speaker
            volume: !lambda |-
              float vol = id(mumble_speaker_volume).state;
              if (isnan(vol)) vol = 65;
              return vol / 100.0f;
  platformio_options:
    extra_scripts:
      - pre:../../../../scripts/patch_mbedtls_requires.py
    build_flags:
      - -Wno-cpp
      - -Wno-stringop-overread

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_MBEDTLS_AES_C: "y"
      CONFIG_MBEDTLS_GCM_C: "y"
      CONFIG_ESP_TLS_INSECURE: "y"
      CONFIG_ESP_TLS_SKIP_SERVER_CERT_VERIFY: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password

logger:
  hardware_uart: USB_SERIAL_JTAG

# Screen backlight: default on for status display (Box-3 uses GPIO47; Box uses GPIO45)
output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: screen_backlight
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 14
    glyphsets: [GF_Latin_Kernel]
  - file: "gfonts://Roboto"
    id: font_server
    size: 18
    glyphsets: [GF_Latin_Kernel]
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 14
    glyphsets: [GF_Latin_Kernel]

# SPI for display (Box-3: GPIO7 SCK, GPIO6 MOSI)
spi:
  - id: spi_bus
    clk_pin: GPIO7
    mosi_pin: GPIO6

# Display (required by touchscreen). Box-3: ILI9342. Styling matches esp32-s3-box (card layout).
# Status display: active writes may help touchscreen; shows server, ping, mute, voice RX/TX.
display:
  - platform: ili9xxx
    model: ili9342
    data_rate: 40MHz
    invert_colors: true
    spi_id: spi_bus
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin:
      number: GPIO48
      inverted: true
    dimensions:
      width: 320
      height: 240
    id: box_display
    update_interval: 1s
    lambda: |-
      int w = it.get_width();
      int h = it.get_height();
      auto fg = Color(255, 255, 255);
      auto dim = Color(140, 140, 140);
      auto bg = Color(24, 24, 28);
      auto card = Color(40, 40, 48);
      auto accent = Color(60, 60, 72);
      it.fill(bg);
      it.filled_rectangle(6, 6, w - 12, h - 12, card);
      it.rectangle(6, 6, w - 12, h - 12, accent);
      it.print(14, 14, id(font_title), dim, "MUMBLE");
      auto srv = id(mumble_server_host).state;
      if (srv.empty()) srv = "--";
      else if (srv.length() > 22) srv = srv.substr(0, 19) + "...";
      it.print(14, 36, id(font_server), fg, srv.c_str());
      it.horizontal_line(14, 62, w - 28);
      float p = id(mumble_ping_sensor).state;
      if (isnan(p)) it.print(14, 72, id(font_small), dim, "Ping: --");
      else it.printf(14, 72, id(font_small), fg, "Ping: %.0f ms", p);
      int y = 100;
      bool muted = id(button_microphone).state;
      bool rx = id(mumble_voice_active).state;
      bool tx = id(mumble_voice_sending).state;
      it.printf(14, y, id(font_small), muted ? Color(240, 100, 100) : dim, "Mic: %s  ", muted ? "MUTED" : "UNMUTED");
      it.printf(14, y + 20, id(font_small), rx ? Color(100, 220, 120) : dim, "RX: %s  ", rx ? "on" : "off");
      it.printf(14, y + 40, id(font_small), tx ? Color(100, 180, 255) : dim, "TX: %s  ", tx ? "on" : "off");

# Touchscreen (GT911): red circle button below display is index 0
touchscreen:
  - platform: gt911
    id: box_touchscreen
    display: box_display
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true

# GPIO1 = hardware mic mute button (latching toggle). LED off = unmuted, LED on = muted.
# On unmute, re-init ES7210 via I2C to restore ADC registers after hardware mute.
binary_sensor:
  - platform: gt911
    name: "PTT"
    id: button_ptt
    gt911_id: box_touchscreen
    index: 0
    on_press:
      - if:
          condition:
            - binary_sensor.is_on: mumble_connected_sensor
          then:
            - if:
                condition:
                  - lambda: 'return id(mumble_client).get_mode() == 2;'
                then:
                  - mumble.communicator_toggle: mumble_client
                else:
                  - mumble.microphone_enable: mumble_client
    on_release:
      - if:
          condition:
            - lambda: 'return id(mumble_client).get_mode() != 2;'
          then:
            - mumble.microphone_disable: mumble_client
  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    name: "Microphone Muted"
    id: button_microphone
    on_state:
      - if:
          condition:
            binary_sensor.is_on: button_microphone
          then:
            - microphone.mute:
            - mumble.microphone_disable: mumble_client
          else:
            - lambda: id(es7210_adc).setup();
            - delay: 50ms
            - microphone.unmute:
            - mumble.microphone_enable: mumble_client
  - platform: template
    name: "Voice Received"
    id: mumble_voice_active
    icon: "mdi:microphone-message"
    device_class: running
    lambda: |-
      return id(mumble_client).get_voice_active();
  - platform: template
    name: "Voice Sending"
    id: mumble_voice_sending
    icon: "mdi:microphone"
    device_class: running
    lambda: |-
      return id(mumble_client).get_voice_sending();
# Diagnostics
  - platform: template
    name: "Mumble Connected"
    id: mumble_connected_sensor
    icon: "mdi:connection"
    entity_category: diagnostic
    device_class: connectivity
    lambda: |-
      return id(mumble_client).is_connected();
i2c:
  scl: GPIO18
  sda: GPIO8

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 30dB

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    i2s_audio_id: i2s_audio_bus
    bits_per_sample: 16bit
    bits_per_channel: 16bit
    channel: left
    adc_type: external
    correct_dc_offset: true

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    buffer_duration: 500ms

# Communicator chime: embedded in Mumble component (bus-aware playback via manage_i2s_bus)

api:

ota:
  - platform: esphome

# Mumble connection and mode settings (Configuration section; persisted to NVS)
# Entity names use numeric prefixes for display order: server, port, username, password, channel, mode
# Port is text (not number) so it displays as integer in HA, per home-assistant-voice-pe pattern
text:
  - platform: template
    id: mumble_server_host
    name: "1. Server"
    icon: "mdi:server-network"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "192.168.1.100"
    max_length: 253
  - platform: template
    id: mumble_server_port
    name: "2. Port"
    icon: "mdi:ethernet"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "64738"
    max_length: 5
  - platform: template
    id: mumble_username
    name: "3. Username"
    icon: "mdi:account"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""  # Seeded with esp32-<MAC> at setup; user can overwrite
    max_length: 128
  - platform: template
    id: mumble_password
    name: "4. Password"
    icon: "mdi:key"
    entity_category: config
    mode: password
    optimistic: true
    restore_value: true
    initial_value: ""  # Component publishes empty default at setup (avoids HA "unknown")
    max_length: 128
  - platform: template
    id: mumble_channel
    name: "5. Channel"
    icon: "mdi:forum"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""  # Component publishes empty default at setup (avoids HA "unknown")
    max_length: 128
select:
  - platform: template
    id: mumble_mode
    name: "6. Mode"
    icon: "mdi:microphone-settings"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "always_on"
    options:
      - "always_on"
      - "push_to_talk"
      - "communicator"
  - platform: template
    id: mumble_crypto
    name: "7. Crypto"
    icon: "mdi:lock"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "legacy"
    options:
      - "legacy"
      - "lite"

# Diagnostics section (HA device page)
button:
  - platform: template
    name: "Reset Config"
    id: mumble_reset_config
    icon: "mdi:restore"
    entity_category: diagnostic
    on_press:
      - mumble.reset_config: mumble_client
      - number.set:
          id: mumble_speaker_volume
          value: 65
  - platform: restart
    name: "Reboot"
    id: mumble_reboot
    icon: "mdi:restart"
    entity_category: diagnostic
text_sensor:
  - platform: template
    name: "Transport"
    id: mumble_transport
    icon: "mdi:protocol"
    entity_category: diagnostic
    lambda: |-
      if (id(mumble_client).get_voice_transport_udp()) {
        return {"UDP"};
      } else {
        return {"TCP"};
      }
    update_interval: 5s
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    icon: "mdi:wifi"
    entity_category: diagnostic
    update_interval: 60s
  - platform: template
    name: "Mumble Ping"
    id: mumble_ping_sensor
    icon: "mdi:lan"
    entity_category: diagnostic
    unit_of_measurement: "ms"
    device_class: duration
    accuracy_decimals: 0
    lambda: |-
      return id(mumble_client).get_ping_ms();
    update_interval: 5s

# Controls: speaker volume and microphone
number:
  - platform: template
    name: "Speaker Volume"
    id: mumble_speaker_volume
    icon: "mdi:volume-high"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 65
    set_action:
      - speaker.volume_set:
          id: box_speaker
          volume: !lambda 'return x / 100.0;'

# Speaker Enable: Box-3 PA enable on GPIO46 (original Box may use same)
switch:
  - platform: gpio
    name: "Speaker Power"
    icon: "mdi:speaker"
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
  - platform: template
    name: "Mute"
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      - microphone.mute:
      - mumble.microphone_disable: mumble_client
    on_turn_off:
      - microphone.unmute:
      - mumble.microphone_enable: mumble_client

external_components:
  - source:
      type: local
      path: ../components

mumble:
  id: mumble_client
  server: "192.168.1.100"  # Fallback when text entity not yet synced
  port: 64738
  username: ""
  password: ""
  channel: ""
  server_text_id: mumble_server_host
  port_text_id: mumble_server_port
  username_text_id: mumble_username
  password_text_id: mumble_password
  channel_text_id: mumble_channel
  mode_select_id: mumble_mode
  crypto_select_id: mumble_crypto
  microphone_id: box_mic
  speaker_id: box_speaker
  mode: always_on
  crypto: legacy
  # mute_pin: GPIO38  # Hardware mute switch if available
