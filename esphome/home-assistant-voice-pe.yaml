---
# Home Assistant Voice Preview Edition board config for Mumble client
# Uses ESP-IDF framework with lwIP netconn for UDP.
# Keep functionally in sync with esp32-s3-box.yaml (same entities/features; only pins/hardware differ).
# Pins from esphome/home-assistant-voice-pe: center GPIO0, mute GPIO3, dial GPIO16/18,
# I2S mic secondary DIN15/BCLK13/LRCLK14, speaker DOUT10/BCLK8/LRCLK7, AIC3204 + XMOS voice_kit.
# Configure server, port, username, password, channel, and mode in Home Assistant UI (values persist in NVS)
# First flash after switching framework must be via USB, not OTA.

substitutions:
  name: esp32-mumble-voice-pe

esphome:
  name: ${name}
  name_add_mac_suffix: true
  min_version: "2026.7.0"
  on_boot:
    - priority: 600
      then:
        - switch.turn_on: speaker_power
    - priority: -100
      then:
        - speaker.volume_set:
            id: voice_pe_speaker
            volume: !lambda |-
              float vol = id(mumble_speaker_volume).state;
              if (isnan(vol)) vol = 65;
              return vol / 100.0f;
  platformio_options:
    extra_scripts:
      - pre:../../../../scripts/patch_mbedtls_requires.py
    build_flags:
      - -Wno-cpp
      - -Wno-stringop-overread

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHz
  # PlatformIO toolchain required for local symlink:// micro-opus and mbedtls pre-script.
  toolchain: platformio
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_MBEDTLS_AES_C: "y"
      CONFIG_MBEDTLS_GCM_C: "y"
      CONFIG_ESP_TLS_INSECURE: "y"
      CONFIG_ESP_TLS_SKIP_SERVER_CERT_VERIFY: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password

logger:
  hardware_uart: USB_SERIAL_JTAG

# LED ring power (GPIO45) and status indication
power_supply:
  - id: led_power
    pin:
      number: GPIO45
      ignore_strapping_warning: true

light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    name: "LED Ring"
    pin: GPIO21
    chipset: WS2812
    num_leds: 12
    rgb_order: GRB
    rmt_symbols: 192
    max_refresh_rate: 15ms
    default_transition_length: 0ms
    power_supply: led_power
    entity_category: config
    # Default on for status indication; HA off is respected (interval gated below).
    restore_mode: RESTORE_DEFAULT_ON
    effects:
      - pulse:
          name: Connecting
          transition_length: 1s
          update_interval: 1s
      - addressable_rainbow:
          name: Talking
          width: 12
          speed: 10

# Status colors only while the ring is on — do not override HA turn_off.
interval:
  - interval: 500ms
    then:
      - if:
          condition:
            light.is_on: led_ring
          then:
            - if:
                condition:
                  or:
                    - binary_sensor.is_on: hardware_mute_switch
                    - switch.is_on: mute
                then:
                  - light.turn_on:
                      id: led_ring
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: 40%
                      effect: none
                else:
                  - if:
                      condition:
                        or:
                          - binary_sensor.is_on: mumble_voice_sending
                          - binary_sensor.is_on: mumble_voice_active
                      then:
                        - light.turn_on:
                            id: led_ring
                            brightness: 60%
                            effect: Talking
                      else:
                        - if:
                            condition:
                              binary_sensor.is_on: mumble_connected_sensor
                            then:
                              - light.turn_on:
                                  id: led_ring
                                  red: 0%
                                  green: 80%
                                  blue: 20%
                                  brightness: 25%
                                  effect: none
                            else:
                              - light.turn_on:
                                  id: led_ring
                                  red: 20%
                                  green: 40%
                                  blue: 100%
                                  brightness: 30%
                                  effect: Connecting

# Center button (GPIO0): PTT / Communicator. Mute slider (GPIO3). Jack detect (GPIO17).
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
    name: "PTT"
    id: button_ptt
    on_press:
      - if:
          condition:
            and:
              - binary_sensor.is_on: mumble_connected_sensor
              - binary_sensor.is_off: hardware_mute_switch
              - switch.is_off: mute
          then:
            - if:
                condition:
                  - lambda: 'return id(mumble_client).get_mode() == 2;'
                then:
                  - mumble.communicator_toggle: mumble_client
                else:
                  - mumble.microphone_enable: mumble_client
    on_release:
      - if:
          condition:
            - lambda: 'return id(mumble_client).get_mode() != 2;'
          then:
            - mumble.microphone_disable: mumble_client
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT
    name: "Microphone Muted"
    id: hardware_mute_switch
    # Drive HA Mute switch so LED/entity stay in sync; actions live on the Mute switch.
    on_press:
      - switch.turn_on: mute
    on_release:
      - switch.turn_off: mute
  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT
    name: "Audio Jack"
    id: jack_plugged
    entity_category: diagnostic
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
  - platform: template
    name: "Voice Received"
    id: mumble_voice_active
    icon: "mdi:microphone-message"
    device_class: running
    lambda: |-
      return id(mumble_client).get_voice_active();
  - platform: template
    name: "Voice Sending"
    id: mumble_voice_sending
    icon: "mdi:microphone"
    device_class: running
    lambda: |-
      return id(mumble_client).get_voice_sending();
# Diagnostics
  - platform: template
    name: "Mumble Connected"
    id: mumble_connected_sensor
    icon: "mdi:connection"
    entity_category: diagnostic
    device_class: connectivity
    lambda: |-
      return id(mumble_client).is_connected();

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz

# Dual I2S buses (ESP is secondary; XMOS / AIC path provide clocks)
i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8
  - id: i2s_input
    i2s_lrclk_pin: GPIO14
    i2s_bclk_pin: GPIO13

audio_dac:
  - platform: aic3204
    id: aic3204_dac
    i2c_id: internal_i2c

voice_kit:
  id: voice_kit_component
  i2c_id: internal_i2c
  reset_pin: GPIO4
  firmware:
    url: https://github.com/esphome/voice-kit-xmos-firmware/releases/download/v1.3.1/ffva_v1.3.1_upgrade.bin
    version: "1.3.1"
    md5: 964635c5bf125529dab14a2472a15401

# XMOS delivers 32-bit stereo @ 16 kHz (secondary). Mumble downmixes to 16-bit mono in on_microphone_data.
microphone:
  - platform: i2s_audio
    id: voice_pe_mic
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo
    correct_dc_offset: true

# Hardware output is 48 kHz (secondary clocks from AIC/XMOS). Mumble/chime are 16 kHz mono,
# so play through a resampler into the I2S speaker (see EsphomeSpeakerSink stream info).
speaker:
  - platform: i2s_audio
    id: voice_pe_speaker_hw
    i2s_dout_pin: GPIO10
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_output
    channel: left
    audio_dac: aic3204_dac
    buffer_duration: 500ms
    timeout: never
  - platform: resampler
    id: voice_pe_speaker
    output_speaker: voice_pe_speaker_hw
    sample_rate: 48000
    bits_per_sample: 16
    buffer_duration: 500ms
    task_stack_in_psram: true

# Communicator chime: embedded in Mumble component (bus-aware playback via manage_i2s_bus)

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - lambda: |-
        if (id(mumble_server_host).state.empty()) {
          ESP_LOGI("mumble", "Server not configured; using Home Assistant IP: %s", client_address.c_str());
          id(mumble_server_host).make_call().set_value(client_address).perform();
        }

ota:
  - platform: esphome
    password: !secret ota_password

# Mumble connection and mode settings (Configuration section; persisted to NVS)
# Entity names use numeric prefixes for display order: server, port, username, password, channel, mode
# Port is text (not number) so it displays as integer in HA, per home-assistant-voice-pe pattern
text:
  - platform: template
    id: mumble_server_host
    name: "1. Server"
    icon: "mdi:server-network"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""
    max_length: 253
  - platform: template
    id: mumble_server_port
    name: "2. Port"
    icon: "mdi:ethernet"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "64738"
    max_length: 5
  - platform: template
    id: mumble_username
    name: "3. Username"
    icon: "mdi:account"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""  # Seeded with esp32-<MAC> at setup; user can overwrite
    max_length: 128
  - platform: template
    id: mumble_password
    name: "4. Password"
    icon: "mdi:key"
    entity_category: config
    mode: password
    optimistic: true
    restore_value: true
    initial_value: ""  # Component publishes empty default at setup (avoids HA "unknown")
    max_length: 128
  - platform: template
    id: mumble_channel
    name: "5. Channel"
    icon: "mdi:forum"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "Root"  # Default channel; case-insensitive match
    max_length: 128
select:
  - platform: template
    id: mumble_mode
    name: "6. Mode"
    icon: "mdi:microphone-settings"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "always_on"
    options:
      - "always_on"
      - "push_to_talk"
      - "communicator"
  - platform: template
    id: mumble_crypto
    name: "7. Crypto"
    icon: "mdi:lock"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "legacy"
    options:
      - "legacy"
      - "lite"

# Diagnostics section (HA device page)
button:
  - platform: template
    name: "Reset Config"
    id: mumble_reset_config
    icon: "mdi:restore"
    entity_category: diagnostic
    on_press:
      - mumble.reset_config: mumble_client
      - number.set:
          id: mumble_speaker_volume
          value: 65
  - platform: restart
    name: "Reboot"
    id: mumble_reboot
    icon: "mdi:restart"
    entity_category: diagnostic
text_sensor:
  - platform: template
    name: "Transport"
    id: mumble_transport
    icon: "mdi:protocol"
    entity_category: diagnostic
    lambda: |-
      if (id(mumble_client).get_voice_transport_udp()) {
        return {"UDP"};
      } else {
        return {"TCP"};
      }
    update_interval: 5s

# Jog wheel: volume ±5 on Speaker Volume (HA number stays in sync)
sensor:
  - platform: rotary_encoder
    id: dial
    internal: true
    pin_a: GPIO16
    pin_b: GPIO18
    resolution: 2
    on_clockwise:
      - number.set:
          id: mumble_speaker_volume
          value: !lambda |-
            float v = id(mumble_speaker_volume).state;
            if (isnan(v)) v = 65.0f;
            if (v > 95.0f) return 100.0f;
            return v + 5.0f;
    on_anticlockwise:
      - number.set:
          id: mumble_speaker_volume
          value: !lambda |-
            float v = id(mumble_speaker_volume).state;
            if (isnan(v)) v = 65.0f;
            if (v < 5.0f) return 0.0f;
            return v - 5.0f;
  - platform: wifi_signal
    name: "WiFi Signal"
    icon: "mdi:wifi"
    entity_category: diagnostic
    update_interval: 60s
  - platform: template
    name: "Mumble Ping"
    id: mumble_ping_sensor
    icon: "mdi:lan"
    entity_category: diagnostic
    unit_of_measurement: "ms"
    device_class: duration
    accuracy_decimals: 0
    lambda: |-
      return id(mumble_client).get_ping_ms();
    update_interval: 5s

# Controls: speaker volume and microphone
number:
  - platform: template
    name: "Speaker Volume"
    id: mumble_speaker_volume
    icon: "mdi:volume-high"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 65
    set_action:
      - speaker.volume_set:
          id: voice_pe_speaker
          volume: !lambda 'return x / 100.0;'

switch:
  - platform: gpio
    name: "Speaker Power"
    id: speaker_power
    icon: "mdi:speaker"
    pin: GPIO47
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
  - platform: template
    name: "Mute"
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      - microphone.mute:
      - mumble.microphone_disable: mumble_client
    on_turn_off:
      # Hardware mute overrides software unmute
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - microphone.unmute:
            - mumble.microphone_enable: mumble_client

external_components:
  - source:
      type: local
      path: ../components

mumble:
  id: mumble_client
  server: ""  # Empty by default; auto-filled from HA IP when adopted, or set manually
  port: 64738
  username: ""
  password: ""
  channel: "Root"
  server_text_id: mumble_server_host
  port_text_id: mumble_server_port
  username_text_id: mumble_username
  password_text_id: mumble_password
  channel_text_id: mumble_channel
  mode_select_id: mumble_mode
  crypto_select_id: mumble_crypto
  microphone_id: voice_pe_mic
  speaker_id: voice_pe_speaker
  mode: always_on
  crypto: legacy
  # Optional: set ca_cert to a PEM CA string to verify the Mumble server TLS cert (default: insecure, trusted LAN).
