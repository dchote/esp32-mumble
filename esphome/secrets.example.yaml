# Uncomment and wire api.encryption.key in your board YAML if desired.
# api_encryption_key: "your-32-byte-base64-key-here"
# Optional: password-protected OTA
# Uncomment and set ota.password in your board YAML if desired.
# ota_password: "your-ota-password"
